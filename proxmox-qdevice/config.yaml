name: Proxmox QDevice
version: "1.0.0"
slug: proxmox_qdevice
description: >-
  External QDevice for Proxmox VE clusters. Provides corosync-qnetd service
  to act as a third vote in even-numbered Proxmox clusters, ensuring quorum.
url: "https://github.com/acon96/proxmox-qdevice-addon"
arch:
  - aarch64
  - amd64
startup: services
boot: auto
init: false
ports:
  22/tcp: 22
  5403/tcp: 5403
ports_description:
  22/tcp: SSH server for Proxmox cluster authentication
  5403/tcp: Corosync QNetd service port
host_network: false
options:
  root_password: "password"
  ssh_port: 22
  qnetd_port: 5403
schema:
  root_password: password
  ssh_port: port
  qnetd_port: port
image: "ghcr.io/acon96/app-proxmox-qdevice"